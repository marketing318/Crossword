<!DOCTYPE html>
<html>
<head>
<title>#EBMGMP2026 Crossword 3</title>

<style>
body { font-family: Arial; }

.cell {
  width:28px;
  height:28px;
  border:1px solid #333;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

.cell:hover { background:#ffe8cc; }

.box {
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  background:#fffaf0;
}
</style>

</head>

<body>

<h2>#EBMGMP2026 Crossword 3</h2>

<form action="https://script.google.com/macros/s/AKfycbz-quQObyDijHUTTaKEl0ctq8g2qrq3S5OLkgVR6KOag7MHQx-1Ctuigcq2XssYu3GJ/exec"
method="POST" onsubmit="return prepareSubmission()">

<div class="box">
<input type="text" name="name" placeholder="Your Name" required><br><br>
<input type="email" name="email" placeholder="Your Email" required>
<input type="hidden" name="grid_data" id="grid_data">
</div>

<table id="grid"></table>

<div class="box" id="answerBox" style="display:none;">
<div id="clue"></div><br>
<input id="wordInput" style="text-transform:uppercase;"><br><br>
<button type="button" onclick="fillWord()">OK</button>
<button type="button" onclick="closeBox()">Cancel</button>
</div>

<br>
<button type="submit">Submit Crossword</button>

</form>

<script>

let width=14, height=14;

let words=[
"QRM","ROOTCAUSE","CAPA","DATAINTEGRITY","SOP","QMS",
"VALIDATION","DEVIATION","AUDIT","GMP"
];

let clues=[
"Systematic approach to assess and control risks in GMP",
"Investigation step used to identify the fundamental cause of a problem",
"System used to address root cause and prevent recurrence of issues",
"Principle ensuring data is accurate, complete, and reliable throughout lifecycle",
"Written step-by-step instructions used in GMP processes",
"System that manages quality processes across lifecycle",
"Process of proving systems and processes perform as intended",
"Any unplanned event that departs from approved procedures or processes",
"Formal inspection process to check compliance with GMP requirements",
"Regulatory framework ensuring consistent product quality and safety"
];

let posX=[7,0,4,1,7,7,5,11,2,9];
let posY=[0,2,6,8,10,0,1,5,8,8];
let horizontalLimit=4;

let currentWord=-1;

// build grid structure
let gridMap=[];

for(let y=0;y<height;y++){
gridMap[y]=[];
for(let x=0;x<width;x++) gridMap[y][x]=false;
}

// mark valid cells
for(let i=0;i<words.length;i++){
for(let j=0;j<words[i].length;j++){
let x=posX[i]+(i<=horizontalLimit?j:0);
let y=posY[i]+(i>horizontalLimit?j:0);
gridMap[y][x]=true;
}
}

// render grid
let html="";
for(let y=0;y<height;y++){
html+="<tr>";
for(let x=0;x<width;x++){
if(gridMap[y][x]){
html+=`<td class="cell" id="c${x}_${y}" onclick="selectWord(${x},${y})"></td>`;
}else{
html+="<td></td>";
}
}
html+="</tr>";
}

document.getElementById("grid").innerHTML=html;

// select word
function selectWord(x,y){

for(let i=0;i<words.length;i++){
for(let j=0;j<words[i].length;j++){

let px=posX[i]+(i<=horizontalLimit?j:0);
let py=posY[i]+(i>horizontalLimit?j:0);

if(px===x && py===y){
currentWord=i;
document.getElementById("clue").innerText=clues[i];
document.getElementById("answerBox").style.display="block";
document.getElementById("wordInput").value="";
return;
}
}
}
}

// fill word
function fillWord(){

let val=document.getElementById("wordInput").value.toUpperCase();

if(val.length!==words[currentWord].length){
alert("Incorrect length");
return;
}

for(let j=0;j<val.length;j++){
let x=posX[currentWord]+(currentWord<=horizontalLimit?j:0);
let y=posY[currentWord]+(currentWord>horizontalLimit?j:0);
document.getElementById(`c${x}_${y}`).innerText=val[j];
}

closeBox();
}

function closeBox(){
document.getElementById("answerBox").style.display="none";
}

// prepare submission
function prepareSubmission(){

let rows=[];
let incomplete=false;

for(let y=0;y<height;y++){
let row="";
for(let x=0;x<width;x++){

let cell=document.getElementById(`c${x}_${y}`);

if(!cell){
row+="#";
}else if(cell.innerText===""){
row+=".";
incomplete=true;
}else{
row+=cell.innerText;
}
}
rows.push(row);
}

if(incomplete){
alert("Please complete the crossword before submitting.");
return false;
}

document.getElementById("grid_data").value=rows.join("\n");

return true;
}

// random hint letters
setTimeout(()=>{
for(let i=0;i<words.length;i++){
let r=Math.floor(Math.random()*words[i].length);
let x=posX[i]+(i<=horizontalLimit?r:0);
let y=posY[i]+(i>horizontalLimit?r:0);
let cell=document.getElementById(`c${x}_${y}`);
if(cell && cell.innerText===""){
cell.innerText=words[i][r];
}
}
},500);

</script>

</body>
</html>
