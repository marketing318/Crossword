<script type="text/javascript">
var BadChars="`~!@^*()_={[}]\\|:;\"',<>/?";
var TableAcrossWord,TableDownWord;
var CurrentWord=-1,PrevWordHorizontal=false;
var CrosswordFinished=false,Initialized=false;

function PadNumber(n){return(n<10?"00":n<100?"0":"")+n;}
function CellAt(x,y){return document.getElementById("c"+PadNumber(x)+PadNumber(y));}

if(document.getElementById("waitmessage")){
 document.getElementById("waitmessage").innerHTML="Please wait while the crossword is loaded…";

 TableAcrossWord=new Array(CrosswordWidth);
 TableDownWord=new Array(CrosswordWidth);
 for(var x=0;x<CrosswordWidth;x++){
  TableAcrossWord[x]=[];
  TableDownWord[x]=[];
  for(var y=0;y<CrosswordHeight;y++){
   TableAcrossWord[x][y]=-1;
   TableDownWord[x][y]=-1;
  }
 }

 for(var i=0;i<=LastHorizontalWord;i++)
  for(var j=0;j<WordLength[i];j++)
   TableAcrossWord[WordX[i]+j][WordY[i]]=i;

 for(var i=LastHorizontalWord+1;i<Words;i++)
  for(var j=0;j<WordLength[i];j++)
   TableDownWord[WordX[i]][WordY[i]+j]=i;

 document.writeln('<table id="crossword" cellpadding="0" cellspacing="0" style="display:none;border-collapse:collapse;">');
 for(var y=0;y<CrosswordHeight;y++){
  document.writeln("<tr>");
  for(var x=0;x<CrosswordWidth;x++){
   if(TableAcrossWord[x][y]>=0||TableDownWord[x][y]>=0)
    document.write('<td id="c'+PadNumber(x)+PadNumber(y)+'" class="ecw-box ecw-boxnormal_unsel" onclick="SelectThisWord(event)">&nbsp;</td>');
   else
    document.write("<td></td>");
  }
  document.writeln("</tr>");
 }
 document.writeln("</table>");

 Initialized=true;
 document.getElementById("waitmessage").style.display="none";
 document.getElementById("crossword").style.display="block";
}

function WordEntryKeyPress(e){if(CurrentWord>=0&&e.keyCode==13)OKClick();}

function ChangeCurrentWordSelectedStyle(sel){
 if(CurrentWord<0)return;
 var x=WordX[CurrentWord],y=WordY[CurrentWord];
 if(CurrentWord<=LastHorizontalWord)
  for(var i=0;i<WordLength[CurrentWord];i++)
   CellAt(x+i,y).className="ecw-box "+(sel?"ecw-boxnormal_sel":"ecw-boxnormal_unsel");
 else
  for(var i=0;i<WordLength[CurrentWord];i++)
   CellAt(x,y+i).className="ecw-box "+(sel?"ecw-boxnormal_sel":"ecw-boxnormal_unsel");
}

function DeselectCurrentWord(){
 if(CurrentWord<0)return;
 ChangeCurrentWordSelectedStyle(false);
 document.getElementById("answerbox").style.display="none";
 CurrentWord=-1;
}

function SelectThisWord(e){
 if(CrosswordFinished)return;
 if(CurrentWord>=0)OKClick();
 DeselectCurrentWord();

 var t=e.target;
 var x=parseInt(t.id.substr(1,3));
 var y=parseInt(t.id.substr(4,3));

 if(TableAcrossWord[x][y]>=0&&TableDownWord[x][y]>=0)
  CurrentWord=PrevWordHorizontal?TableDownWord[x][y]:TableAcrossWord[x][y];
 else
  CurrentWord=Math.max(TableAcrossWord[x][y],TableDownWord[x][y]);

 PrevWordHorizontal=(CurrentWord<=LastHorizontalWord);
 ChangeCurrentWordSelectedStyle(true);

 document.getElementById("wordclue").innerHTML=Clue[CurrentWord];
 document.getElementById("answerbox").style.display="block";
 document.getElementById("wordentry").value="";
 document.getElementById("wordentry").focus();
}

function OKClick(){
 if(CurrentWord<0)return;
 var w=document.getElementById("wordentry").value.toUpperCase();
 if(w.length!=WordLength[CurrentWord])return;

 var x=WordX[CurrentWord],y=WordY[CurrentWord];
 for(var i=0;i<w.length;i++){
  var c=CellAt(x+(CurrentWord<=LastHorizontalWord?i:0),
               y+(CurrentWord>LastHorizontalWord?i:0));
  c.innerHTML=w[i];
 }
 DeselectCurrentWord();
}
</script>

<script type="text/javascript">
function PrepareSubmission(){
 var rows=[];
 for(var y=0;y<CrosswordHeight;y++){
  var row="";
  for(var x=0;x<CrosswordWidth;x++){
   var c=CellAt(x,y);
   if(!c)row+="#";
   else if(c.innerHTML=="&nbsp;"||c.innerHTML==" ")row+=".";
   else row+=c.innerHTML;
  }
  rows.push(row);
 }
 document.getElementById("grid_data").value=rows.join("\n");
 document.getElementById("is_complete").value=
  rows.join("").indexOf(".")==-1?"1":"0";
 return true;
}

   c.innerHTML=Word[i].charAt(0);
 }
},400);
