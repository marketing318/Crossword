<!DOCTYPE html>
<html>
<head>
<title>#EBMGMP2026 Crossword 4</title>

<style>
body { font-family: "Segoe UI", Arial; font-size: small; }

.ecw-answerbox{
background:#FFFAF0;
border:1px solid #808080;
padding:.75em;
margin-bottom:10px;
width:260px;
}

.ecw-box{
border:1px solid #606060;
width:22px;
height:22px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

.ecw-boxnormal_unsel{background:#fff;}
.ecw-boxnormal_sel{background:#FFF1D7;}

.ecw-crosswordarea{
background:#D0D8E0;
border:2px solid #808080;
padding:10px;
}
</style>

</head>

<body>

<h2>#EBMGMP2026 Crossword 4</h2>

<form action="https://script.google.com/macros/s/AKfycbz-quQObyDijHUTTaKEl0ctq8g2qrq3S5OLkgVR6KOag7MHQx-1Ctuigcq2XssYu3GJ/exec"
method="POST"
onsubmit="return prepareSubmission();">

<div class="ecw-answerbox">
<input type="text" name="name" placeholder="Your Name" required><br><br>
<input type="email" name="email" placeholder="Your Email" required>
<input type="hidden" name="grid_data" id="grid_data">
</div>

<div id="crossword" class="ecw-crosswordarea"></div>

<div id="answerbox" class="ecw-answerbox" style="display:none;">
<div id="clue"></div><br>
<input id="wordentry" style="text-transform:uppercase;">
<br><br>
<button type="button" onclick="OKClick()">OK</button>
<button type="button" onclick="closeBox()">Cancel</button>
</div>

<br>
<button type="submit">Submit Crossword</button>

</form>

<script>

let width=16, height=15;

let words=[
"REVIEW","TRACEABILITY","CHANGE","OOS","KPI",
"MONITORING","QUALIFICATION","PROTOCOL","READINESS","BATCH"
];

let clues=[
"A formal review process conducted after manufacturing to evaluate product quality and consistency across batches.",
"The ability to track the history, application, or location of a product or material.",
"The process of formally assessing and approving any change before implementation.",
"A failure to meet predefined specifications or expected results during testing.",
"A measure used to evaluate performance, quality, or compliance over time.",
"A system used to monitor environmental conditions like temperature, humidity, and particles.",
"The act of verifying that equipment or systems are correctly installed and functioning.",
"A documented and approved plan that outlines how a process will be executed and controlled.",
"A state of being ready at all times for inspection, not just preparing when audits are scheduled.",
"A documented record that captures all manufacturing steps, controls, and results for a specific batch."
];

let posX=[10,0,1,2,6,6,8,10,4,10];
let posY=[1,3,7,9,10,12,0,0,2,10];
let horizontalLimit=5;

let currentWord=-1;

// build grid map
let gridMap=[];
for(let y=0;y<height;y++){
gridMap[y]=[];
for(let x=0;x<width;x++) gridMap[y][x]=false;
}

for(let i=0;i<words.length;i++){
for(let j=0;j<words[i].length;j++){
let x=posX[i]+(i<=horizontalLimit?j:0);
let y=posY[i]+(i>horizontalLimit?j:0);
gridMap[y][x]=true;
}
}

// render grid
let html="<table>";
for(let y=0;y<height;y++){
html+="<tr>";
for(let x=0;x<width;x++){
if(gridMap[y][x]){
html+=`<td class="ecw-box ecw-boxnormal_unsel" id="c${x}_${y}" onclick="selectWord(${x},${y})"></td>`;
}else{
html+="<td></td>";
}
}
html+="</tr>";
}
html+="</table>";

document.getElementById("crossword").innerHTML=html;

// select word
function selectWord(x,y){
for(let i=0;i<words.length;i++){
for(let j=0;j<words[i].length;j++){
let px=posX[i]+(i<=horizontalLimit?j:0);
let py=posY[i]+(i>horizontalLimit?j:0);

if(px===x && py===y){
currentWord=i;
document.getElementById("clue").innerText=clues[i];
document.getElementById("answerbox").style.display="block";
document.getElementById("wordentry").value="";
return;
}
}
}
}

// fill word
function OKClick(){
let val=document.getElementById("wordentry").value.toUpperCase();

if(val.length!==words[currentWord].length){
alert("Incorrect length");
return;
}

for(let j=0;j<val.length;j++){
let x=posX[currentWord]+(currentWord<=horizontalLimit?j:0);
let y=posY[currentWord]+(currentWord>horizontalLimit?j:0);
document.getElementById(`c${x}_${y}`).innerText=val[j];
}

closeBox();
}

function closeBox(){
document.getElementById("answerbox").style.display="none";
}

// prevent enter submit
document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
if(document.activeElement.id==="wordentry"){
e.preventDefault();
OKClick();
}
}
});

// submission
function prepareSubmission(){

let rows=[];
let incomplete=false;

for(let y=0;y<height;y++){
let row="";
for(let x=0;x<width;x++){

let cell=document.getElementById(`c${x}_${y}`);

if(!cell){
row+="#";
}else if(cell.innerText===""){
row+=".";
incomplete=true;
}else{
row+=cell.innerText;
}
}
rows.push(row);
}

if(incomplete){
alert("Please complete the crossword before submitting.");
return false;
}

document.getElementById("grid_data").value=rows.join("\n");
return true;
}

// random reveal
setTimeout(()=>{
for(let i=0;i<words.length;i++){
let r=Math.floor(Math.random()*words[i].length);
let x=posX[i]+(i<=horizontalLimit?r:0);
let y=posY[i]+(i>horizontalLimit?r:0);
let cell=document.getElementById(`c${x}_${y}`);
if(cell && cell.innerText===""){
cell.innerText=words[i][r];
}
}
},500);

</script>

</body>
</html>
