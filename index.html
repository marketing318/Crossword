<script type="text/javascript">
CrosswordWidth = 20;
CrosswordHeight = 20;
Words = 17;

WordLength = new Array(14,3,10,10,13,9,4,15,18,10,15,8,5,4,10,8,10);

Word = new Array(
"SUSTAINABILITY",
"QRM",
"ESCALATION",
"VALIDATION",
"CONTAMINATION",
"DEVIATION",
"CAPA",
"AUDITREADINESS",
"SUPPLIEROVERSIGHT",
"INSPECTION",
"DATAINTEGRITY",
"METADATA",
"ALCOA",
"LIMS",
"GOVERNANCE",
"TRENDING",
"ROOTCAUSE"
);

Clue = new Array(
"Integrating environmentally responsible practices into GMP operations without compromising compliance.",
"ICH-aligned framework used to assess, control, communicate, and review quality risks.",
"The act of formally raising a quality issue to higher authority when risk exceeds defined thresholds.",
"Documented evidence that a process, system, or method consistently produces expected results.",
"Unintended introduction of impurities that can compromise product quality and patient safety.",
"An unplanned departure from an approved process, procedure, or specification that must be investigated.",
"A structured system used to investigate root causes and implement corrective and preventive actions to avoid recurrence.",
"The sustained state of compliance where systems, documentation, and teams are always prepared for inspection.",
"Monitoring and controlling external partners to ensure quality across the supply chain.",
"A regulatory evaluation conducted by authorities such as USFDA, WHO, or CDSCO to assess GMP compliance.",
"Ensuring that records are attributable, legible, contemporaneous, original, accurate and complete throughout the data lifecycle.",
"Contextual data that describes other data, critical in digital systems and audit trail reviews.",
"The foundational principles that define core data integrity expectations in GMP environments.",
"A digital system used to manage laboratory samples, test results, audit trails, and compliance documentation.",
"The leadership oversight and accountability structure that ensures compliance and ethical decision-making.",
"Analysis of recurring data patterns to identify early warning signals before failures occur.",
"The fundamental reason behind a deviation or failure, identified through structured investigation."
);

WordX = new Array(2,9,0,10,3,1,14,5,4,1,6,11,18,9,14,12,17);
WordY = new Array(0,2,4,5,9,14,16,19,0,2,2,2,2,8,8,9,10);
LastHorizontalWord = 7;
OnlyCheckOnce = false;
</script>

<script type="text/javascript">
var TableAcrossWord=[],TableDownWord=[];
var CurrentWord=-1,PrevWordHorizontal=false;

function PadNumber(n){return(n<10?"00":n<100?"0":"")+n;}
function CellAt(x,y){return document.getElementById("c"+PadNumber(x)+PadNumber(y));}

(function(){
	for(var x=0;x<CrosswordWidth;x++){
		TableAcrossWord[x]=[]; TableDownWord[x]=[];
		for(var y=0;y<CrosswordHeight;y++){
			TableAcrossWord[x][y]=-1; TableDownWord[x][y]=-1;
		}
	}
	for(var i=0;i<=LastHorizontalWord;i++)
		for(var j=0;j<WordLength[i];j++)
			TableAcrossWord[WordX[i]+j][WordY[i]]=i;

	for(var i=LastHorizontalWord+1;i<Words;i++)
		for(var j=0;j<WordLength[i];j++)
			TableDownWord[WordX[i]][WordY[i]+j]=i;

	document.write('<table id="crossword" style="display:none;border-collapse:collapse">');
	for(var y=0;y<CrosswordHeight;y++){
		document.write("<tr>");
		for(var x=0;x<CrosswordWidth;x++){
			if(TableAcrossWord[x][y]>=0||TableDownWord[x][y]>=0)
				document.write('<td id="c'+PadNumber(x)+PadNumber(y)+'" class="ecw-box ecw-boxnormal_unsel" onclick="SelectThisWord(event)">&nbsp;</td>');
			else document.write("<td></td>");
		}
		document.write("</tr>");
	}
	document.write("</table>");

	document.getElementById("waitmessage").style.display="none";
	document.getElementById("crossword").style.display="block";
})();

function SelectThisWord(e){
	if(CurrentWord>=0) OKClick();
	var t=e.target;
	var x=parseInt(t.id.substr(1,3));
	var y=parseInt(t.id.substr(4,3));
	if(TableAcrossWord[x][y]>=0&&TableDownWord[x][y]>=0)
		CurrentWord=PrevWordHorizontal?TableDownWord[x][y]:TableAcrossWord[x][y];
	else CurrentWord=Math.max(TableAcrossWord[x][y],TableDownWord[x][y]);
	PrevWordHorizontal=CurrentWord<=LastHorizontalWord;
	document.getElementById("answerbox").style.display="block";
	document.getElementById("wordclue").innerHTML=Clue[CurrentWord];
}

function OKClick(){
	if(CurrentWord<0) return;
	var w=document.getElementById("wordentry").value.toUpperCase();
	if(w.length!==WordLength[CurrentWord]) return;
	for(var i=0;i<w.length;i++){
		CellAt(
			WordX[CurrentWord]+(CurrentWord<=LastHorizontalWord?i:0),
			WordY[CurrentWord]+(CurrentWord>LastHorizontalWord?i:0)
		).innerHTML=w[i];
	}
	document.getElementById("answerbox").style.display="none";
	CurrentWord=-1;
}

function PrepareSubmission(){
	var rows=[];
	for(var y=0;y<CrosswordHeight;y++){
		var row="";
		for(var x=0;x<CrosswordWidth;x++){
			var c=CellAt(x,y);
			row+=(!c?"#":(c.innerHTML=="&nbsp;"?".":c.innerHTML));
		}
		rows.push(row);
	}
	document.getElementById("grid_data").value=rows.join("\n");
	document.getElementById("is_complete").value=
		rows.join("").indexOf(".")===-1?"1":"0";
	return true;
}

/* RANDOM LETTER REVEAL */
setTimeout(function(){
	for(var i=0;i<Words;i++){
		var randomIndex=Math.floor(Math.random()*WordLength[i]);
		var x=WordX[i]+(i<=LastHorizontalWord?randomIndex:0);
		var y=WordY[i]+(i>LastHorizontalWord?randomIndex:0);
		var c=CellAt(x,y);
		if(c && c.innerHTML=="&nbsp;")
			c.innerHTML=Word[i].charAt(randomIndex);
	}
},500);
</script>
